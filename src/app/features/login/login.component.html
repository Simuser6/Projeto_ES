<div class="login-container">
  <button class="back-button" mat-icon-button routerLink="/" aria-label="Voltar para a página inicial">
    <mat-icon>arrow_back</mat-icon>
  </button>

  <mat-card class="login-card">
    <div class="logo">
      <mat-icon>build</mat-icon>
      <h1>Hardware Store</h1>
    </div>

    <h2>Entrar</h2>
    <p class="subtitle">Acesse sua conta para continuar.</p>

    <form [formGroup]="loginForm" (ngSubmit)="login()" novalidate>
      <mat-form-field appearance="outline">
        <mat-label>E-mail</mat-label>
        <input
          matInput
          type="email"
          formControlName="username"
          autocomplete="email"
          placeholder="Digite seu e-mail"
        >
        <mat-icon matSuffix>mail</mat-icon>
        <mat-error *ngIf="usernameInvalid">
          Informe um e-mail válido.
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Senha</mat-label>
        <input
          matInput
          [type]="hidePassword ? 'password' : 'text'"
          formControlName="password"
          autocomplete="current-password"
          placeholder="Digite sua senha"
        >
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="hidePassword = !hidePassword"
          [attr.aria-label]="hidePassword ? 'Mostrar senha' : 'Ocultar senha'"
        >
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="passwordInvalid">
          Informe uma senha com pelo menos 6 caracteres.
        </mat-error>
      </mat-form-field>

      <div class="error-message" *ngIf="errorMessage" role="alert">
        <mat-icon>error_outline</mat-icon>
        <span>{{ errorMessage }}</span>
      </div>

      <button
        mat-raised-button
        color="primary"
        class="login-button"
        type="submit"
        [disabled]="isSubmitting"
      >
        <mat-icon>{{ isSubmitting ? 'hourglass_top' : 'login' }}</mat-icon>
        {{ isSubmitting ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <div class="links">
      <a routerLink="/cadastro">Criar conta</a>
      <a routerLink="/esqueci-senha">Esqueci minha senha</a>
    </div>
  </mat-card>
</div>
